{% set name = "datalad-container" %}
{% set pypiname = "datalad_container" %}
{% set version = "1.2.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ pypiname[0] }}/{{ pypiname }}/{{ pypiname }}-{{ version }}.tar.gz
  sha256: b721e71daf9b38fbb70b528198eabfadd9e0769a060cdfc32459fa8e6ac428e3

build:
  number: 1
  script: {{ PYTHON }} -m pip install . -vv
  noarch: python

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - pypandoc
  run:
    - python >={{ python_min }}
    - datalad >=0.18.0
    - requests >=1.2

test:
  requires:
    - pytest
    - python {{ python_min }}

  imports:
    - datalad_container

about:
  home: http://github.com/datalad/datalad-container
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: DataLad extension package for working with containerized environments
  doc_url: http://docs.datalad.org/projects/container/en/latest/index.html
  dev_url: https://github.com/datalad/datalad-container/

extra:
  recipe-maintainers:
    - yarikoptic
